name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and run tests
        # Docker is available on ubuntu-latest, so the Testcontainers integration
        # test runs here; it self-skips on machines without Docker.
        run: ./mvnw -B verify

      - name: Build Docker image
        run: docker build -t carhub:ci .
